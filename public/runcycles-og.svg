<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Cycles — runtime authority for autonomous agents</title>
  <desc>Three AI agents submit actions through the CYCLES budget gate. Allowed actions proceed; blocked actions are rejected when budget is exceeded.</desc>
  <defs>
    <filter id="og-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="og-shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000030"/>
    </filter>
    <filter id="og-shadow-lg" x="-10%" y="-10%" width="120%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000040"/>
    </filter>
    <marker id="og-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00C9A7"/>
    </marker>
    <marker id="og-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF453A"/>
    </marker>
    <marker id="og-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#AEAEB2"/>
    </marker>
    <marker id="og-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF9500"/>
    </marker>
    <radialGradient id="bg-glow" cx="72%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#00C9A7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00C9A7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1B1B1F"/>
  <rect width="1200" height="630" fill="url(#bg-glow)"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="#00C9A7" opacity="0.6"/>

  <!-- ══ LEFT PANEL ══ -->

  <!-- Logo mark -->
  <circle cx="120" cy="102" r="32" fill="none" stroke="#00C9A7" stroke-width="1" opacity="0.12"/>
  <path d="M 138 72 A 32 32 0 1 1 102 72" fill="none" stroke="#00C9A7" stroke-width="10" stroke-linecap="round" filter="url(#og-glow)"/>
  <line x1="108" y1="67" x2="132" y2="67" stroke="#00C9A7" stroke-width="3.5" stroke-linecap="round"/>
  <polyline points="109,104 117,112 131,94" fill="none" stroke="#00C9A7" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Product name -->
  <text x="172" y="115" font-size="42" font-weight="700" fill="#FFFFFF"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    letter-spacing="-0.5">Cycles</text>

  <!-- Divider -->
  <line x1="64" y1="152" x2="560" y2="152" stroke="#3C3C43" stroke-width="1"/>

  <!-- Heading — matches homepage hero text -->
  <text x="64" y="208" font-size="28" font-weight="700" fill="#FFFFFF"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    letter-spacing="-0.3">Runtime authority for</text>
  <text x="64" y="245" font-size="28" font-weight="700" fill="#FFFFFF"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    letter-spacing="-0.3">autonomous agents</text>

  <!-- Tagline — matches homepage hero tagline -->
  <text x="64" y="286" font-size="18" fill="#AEAEB2"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    letter-spacing="-0.1">Keep agents within approved spend,</text>
  <text x="64" y="312" font-size="18" fill="#AEAEB2"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    letter-spacing="-0.1">risk, and action limits.</text>

  <!-- Pills -->
  <rect x="64" y="348" width="152" height="32" rx="16" fill="#00C9A7" fill-opacity="0.12" stroke="#00C9A7" stroke-width="1" stroke-opacity="0.4"/>
  <text x="140" y="369" text-anchor="middle" font-size="13" font-weight="600" fill="#00C9A7"
    font-family="-apple-system, BlinkMacSystemFont, sans-serif">Open Protocol</text>

  <rect x="228" y="348" width="184" height="32" rx="16" fill="#00C9A7" fill-opacity="0.12" stroke="#00C9A7" stroke-width="1" stroke-opacity="0.4"/>
  <text x="320" y="369" text-anchor="middle" font-size="13" font-weight="600" fill="#00C9A7"
    font-family="-apple-system, BlinkMacSystemFont, sans-serif">Multi-language SDKs</text>

  <rect x="424" y="348" width="116" height="32" rx="16" fill="#00C9A7" fill-opacity="0.12" stroke="#00C9A7" stroke-width="1" stroke-opacity="0.4"/>
  <text x="482" y="369" text-anchor="middle" font-size="13" font-weight="600" fill="#00C9A7"
    font-family="-apple-system, BlinkMacSystemFont, sans-serif">Apache 2.0</text>

  <!-- Domain -->
  <text x="64" y="430" font-size="16" fill="#636366"
    font-family="-apple-system, BlinkMacSystemFont, sans-serif">runcycles.io</text>

  <!-- Tech stack — names only -->
  <text x="64" y="486" font-size="18" font-weight="700" fill="#AEAEB2"
    font-family="ui-monospace, 'Menlo', monospace">Java</text>

  <line x1="112" y1="468" x2="112" y2="494" stroke="#48484A" stroke-width="1.5"/>

  <text x="122" y="486" font-size="18" font-weight="700" fill="#AEAEB2"
    font-family="ui-monospace, monospace">Python</text>

  <line x1="196" y1="468" x2="196" y2="494" stroke="#48484A" stroke-width="1.5"/>

  <text x="206" y="486" font-size="18" font-weight="700" fill="#AEAEB2"
    font-family="ui-monospace, monospace">TypeScript</text>

  <line x1="316" y1="468" x2="316" y2="494" stroke="#48484A" stroke-width="1.5"/>

  <text x="326" y="486" font-size="18" font-weight="700" fill="#AEAEB2"
    font-family="ui-monospace, monospace">OpenAPI 3.1</text>

  <line x1="450" y1="468" x2="450" y2="494" stroke="#48484A" stroke-width="1.5"/>

  <text x="460" y="486" font-size="18" font-weight="700" fill="#AEAEB2"
    font-family="ui-monospace, monospace">OpenClaw</text>

  <!-- Vertical separator -->
  <line x1="620" y1="40" x2="620" y2="590" stroke="#2C2C2E" stroke-width="1"/>

  <!-- ══ RIGHT PANEL — Hero diagram (mirrors hero-dark.svg) ══ -->
  <g transform="translate(622, 55) scale(0.96)">

    <!-- Agent A — LLM completion (blue tint) -->
    <rect x="18" y="72" width="120" height="56" rx="12" fill="#2A2C38" filter="url(#og-shadow)"/>
    <circle cx="46" cy="100" r="13" fill="#383A48"/>
    <!-- Chat bubble icon -->
    <path d="M38 94 h16 a2 2 0 0 1 2 2 v8 a2 2 0 0 1-2 2 h-10 l-3 3 v-3 h-3 a2 2 0 0 1-2-2 v-8 a2 2 0 0 1 2-2 z"
          fill="none" stroke="#C7C7CC" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="42" cy="100" r="1.2" fill="#C7C7CC"/>
    <circle cx="46" cy="100" r="1.2" fill="#C7C7CC"/>
    <circle cx="50" cy="100" r="1.2" fill="#C7C7CC"/>
    <text x="68" y="95" font-size="13" font-weight="700" fill="#F2F2F7" font-family="-apple-system,system-ui,sans-serif">Agent A</text>
    <text x="68" y="112" font-size="10" fill="#8E8E93" font-family="-apple-system,system-ui,sans-serif">llm.completion</text>

    <!-- Agent B — Web search (neutral) -->
    <rect x="18" y="212" width="120" height="56" rx="12" fill="#2C2C2E" filter="url(#og-shadow)"/>
    <circle cx="46" cy="240" r="13" fill="#3A3A3C"/>
    <!-- Magnifying glass icon -->
    <circle cx="44" cy="237" r="5" fill="none" stroke="#C7C7CC" stroke-width="1.8"/>
    <line x1="48" y1="241" x2="53" y2="246" stroke="#C7C7CC" stroke-width="2" stroke-linecap="round"/>
    <text x="68" y="235" font-size="13" font-weight="700" fill="#F2F2F7" font-family="-apple-system,system-ui,sans-serif">Agent B</text>
    <text x="68" y="252" font-size="10" fill="#8E8E93" font-family="-apple-system,system-ui,sans-serif">tool.web_search</text>

    <!-- Agent C — Send email (warm tint) -->
    <rect x="18" y="352" width="120" height="56" rx="12" fill="#382A2A" filter="url(#og-shadow)"/>
    <circle cx="46" cy="380" r="13" fill="#483838"/>
    <!-- Envelope icon -->
    <rect x="37" y="374" width="18" height="12" rx="2" fill="none" stroke="#C7C7CC" stroke-width="1.5"/>
    <polyline points="37,374 46,382 55,374" fill="none" stroke="#C7C7CC" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="68" y="375" font-size="13" font-weight="700" fill="#F2F2F7" font-family="-apple-system,system-ui,sans-serif">Agent C</text>
    <text x="68" y="392" font-size="10" fill="#8E8E93" font-family="-apple-system,system-ui,sans-serif">tool.send_email</text>

    <!-- Curved flow lines to gate (matching hero) -->
    <path d="M140 100 C174 100, 194 170, 234 200" fill="none" stroke="#8E8E93" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#og-gray)"/>
    <path d="M140 240 C184 240, 204 240, 234 240" fill="none" stroke="#8E8E93" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#og-gray)"/>
    <path d="M140 380 C174 380, 194 310, 234 280" fill="none" stroke="#FF9500" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="6 4" marker-end="url(#og-orange)"/>

    <!-- Glow rings (3 rings matching hero) -->
    <circle cx="294" cy="240" r="86" fill="none" stroke="#00C9A7" stroke-width="1" opacity="0.30"/>
    <circle cx="294" cy="240" r="98" fill="none" stroke="#00C9A7" stroke-width="1" opacity="0.16"/>
    <circle cx="294" cy="240" r="110" fill="none" stroke="#00C9A7" stroke-width="0.5" opacity="0.08"/>

    <!-- Shield shape — enforcement gate (matching hero) -->
    <path d="M294 166 L342 184 L342 244 Q342 280 294 300 Q246 280 246 244 L246 184 Z"
          fill="#1A3A32" stroke="#00C9A7" stroke-width="2.5" filter="url(#og-shadow-lg)"/>

    <!-- Shield inner glow arc -->
    <path d="M294 174 L334 190 L334 242 Q334 272 294 290 Q254 272 254 242 L254 190 Z"
          fill="none" stroke="#00C9A7" stroke-width="1" opacity="0.2"/>

    <!-- Lock icon inside shield -->
    <rect x="282" y="220" width="24" height="18" rx="4" fill="#00C9A7"/>
    <path d="M288 220 L288 213 Q288 204 294 204 Q300 204 300 213 L300 220" fill="none" stroke="#4DE8CC" stroke-width="3" stroke-linecap="round"/>
    <circle cx="294" cy="229" r="3" fill="#141420"/>
    <line x1="294" y1="231" x2="294" y2="235" stroke="#141420" stroke-width="2.5" stroke-linecap="round"/>

    <!-- CYCLES label -->
    <text x="294" y="330" text-anchor="middle" font-size="15" font-weight="800" fill="#00C9A7" font-family="-apple-system,system-ui,sans-serif" letter-spacing="0.15em">CYCLES</text>

    <!-- Budget meter — directly below shield (matching hero) -->
    <rect x="226" y="346" width="136" height="32" rx="8" fill="#2C2C2E" filter="url(#og-shadow)"/>
    <text x="238" y="366" font-size="10" font-weight="700" fill="#C7C7CC" font-family="-apple-system,system-ui,sans-serif">BUDGET</text>
    <rect x="284" y="360" width="60" height="6" rx="3" fill="#3A3A3C"/>
    <rect x="284" y="360" width="18" height="6" rx="3" fill="#00C9A7"/>
    <text x="349" y="367" font-size="10" fill="#C7C7CC" font-family="-apple-system,system-ui,sans-serif" font-weight="600">30%</text>

    <!-- Arrow to ALLOWED -->
    <path d="M344 210 C374 195, 414 160, 446 145" fill="none" stroke="#00C9A7" stroke-width="2" marker-end="url(#og-teal)"/>

    <!-- ALLOWED card -->
    <rect x="448" y="96" width="148" height="64" rx="12" fill="#1A3A32" filter="url(#og-shadow)"/>
    <rect x="448" y="96" width="4" height="64" rx="2" fill="#00C9A7"/>
    <text x="468" y="118" font-size="13" font-weight="800" fill="#00C9A7" font-family="-apple-system,system-ui,sans-serif">ALLOWED</text>
    <text x="468" y="135" font-size="11" fill="#F2F2F7" font-family="-apple-system,system-ui,sans-serif">Reserved: 50,000</text>
    <text x="468" y="150" font-size="11" fill="#D1D1D6" font-family="-apple-system,system-ui,sans-serif">&#x2713; proceed</text>

    <!-- Arrow to BLOCKED -->
    <path d="M344 272 C374 287, 414 320, 446 335" fill="none" stroke="#FF453A" stroke-width="2" marker-end="url(#og-red)"/>

    <!-- BLOCKED card -->
    <rect x="448" y="320" width="148" height="64" rx="12" fill="#3A1A1A" filter="url(#og-shadow)"/>
    <rect x="448" y="320" width="4" height="64" rx="2" fill="#FF453A"/>
    <text x="468" y="342" font-size="13" font-weight="800" fill="#FF453A" font-family="-apple-system,system-ui,sans-serif">BLOCKED</text>
    <text x="468" y="359" font-size="11" fill="#F2F2F7" font-family="-apple-system,system-ui,sans-serif">Budget: $0.00</text>
    <text x="468" y="374" font-size="11" fill="#D1D1D6" font-family="-apple-system,system-ui,sans-serif">&#x2717; 409 exceeded</text>
  </g>
</svg>
