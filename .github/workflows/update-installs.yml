name: Update Install Count

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Fetch download counts
        run: |
          CACHE_FILE=".vitepress/theme/installs-cache.json"

          # npm packages
          TODAY=$(date +%Y-%m-%d)
          NPM_TOTAL=0
          for pkg in runcycles @runcycles/mcp-server @runcycles/openclaw-budget-guard; do
            COUNT=$(curl -sf "https://api.npmjs.org/downloads/point/2020-01-01:${TODAY}/${pkg}" | jq '.downloads // 0')
            NPM_TOTAL=$((NPM_TOTAL + COUNT))
          done
          echo "npm=$NPM_TOTAL"

          # PyPI packages
          PYPI_TOTAL=0
          for pkg in runcycles runcycles-openai-agents; do
            COUNT=$(curl -sf "https://pypistats.org/api/packages/${pkg}/recent" | jq '.data.last_month // 0')
            PYPI_TOTAL=$((PYPI_TOTAL + COUNT))
          done
          echo "pypi=$PYPI_TOTAL"

          # Read per-source cached values
          CACHED_NPM=$(jq '.npm // 0' "$CACHE_FILE" 2>/dev/null || echo 0)
          CACHED_PYPI=$(jq '.pypi // 0' "$CACHE_FILE" 2>/dev/null || echo 0)
          CACHED_TOTAL=$(jq '.total // 0' "$CACHE_FILE" 2>/dev/null || echo 0)
          echo "cached: npm=$CACHED_NPM pypi=$CACHED_PYPI total=$CACHED_TOTAL"

          # Per-source high-water marks
          NPM_HWM=$(( NPM_TOTAL > CACHED_NPM ? NPM_TOTAL : CACHED_NPM ))
          PYPI_HWM=$(( PYPI_TOTAL > CACHED_PYPI ? PYPI_TOTAL : CACHED_PYPI ))
          SUM=$((NPM_HWM + PYPI_HWM))
          TOTAL=$(( SUM > CACHED_TOTAL ? SUM : CACHED_TOTAL ))
          echo "hwm: npm=$NPM_HWM pypi=$PYPI_HWM total=$TOTAL"

          # Update if any source grew
          if [ "$NPM_HWM" -gt "$CACHED_NPM" ] || [ "$PYPI_HWM" -gt "$CACHED_PYPI" ] || [ "$TOTAL" -gt "$CACHED_TOTAL" ]; then
            NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            JSON="{\"npm\":${NPM_HWM},\"pypi\":${PYPI_HWM},\"ghcr\":0,\"maven\":0,\"total\":${TOTAL},\"fetchedAt\":\"${NOW}\"}"
            echo "$JSON" > "$CACHE_FILE"
            echo "UPDATED=true" >> $GITHUB_ENV
            echo "Updated: ${CACHED_TOTAL} → ${TOTAL}"
          else
            echo "UPDATED=false" >> $GITHUB_ENV
            echo "No update needed: total=${TOTAL} <= cached=${CACHED_TOTAL}"
          fi

      - name: Commit and push
        if: env.UPDATED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .vitepress/theme/installs-cache.json
          git commit -m "chore: update install count"
          git push
