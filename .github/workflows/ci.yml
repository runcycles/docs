name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: runcycles/cycles-protocol
          path: cycles-protocol
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install
      - run: npm test
      - run: npm run build
