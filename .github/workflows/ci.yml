name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: runcycles/cycles-protocol
          path: cycles-protocol
      - uses: actions/checkout@v4
        with:
          repository: runcycles/cycles-server-admin
          path: cycles-server-admin
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: npm run build
