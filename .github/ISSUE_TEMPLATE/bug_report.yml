name: Bug Report
description: Report a bug in any Runcycles repository
labels: ["bug"]
body:
  - type: dropdown
    id: repo
    attributes:
      label: Repository
      description: Which repository is affected?
      options:
        - cycles-server
        - cycles-server-admin
        - cycles-protocol
        - cycles-client-python
        - cycles-client-typescript
        - cycles-spring-boot-starter
        - cycles-mcp-server
        - cycles-openai-agents
        - cycles-openclaw-budget-guard
        - cycles-runaway-demo
        - cycles-agent-action-authority-demo
        - docs
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Package/server version (e.g., 0.2.0)
      placeholder: "0.2.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Configure Cycles with...
        2. Call...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runtime details.
      placeholder: |
        - OS: Ubuntu 24.04
        - Runtime: Python 3.12 / Node 22 / Java 21
        - Redis: 7.x
      render: markdown

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any error messages or stack traces.
      render: shell
